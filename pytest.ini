[pytest]
testpaths = ai_router/tests
addopts = --import-mode=importlib
markers =
    failure_injection: end-to-end crash/lease/concurrency recovery scenarios for the role-loops queue (run with `pytest -m failure_injection`).
    e2e: orchestrator end-to-end harness that drives start_session/close_session against tmpdir-scoped fixture session sets backed by real git repos (run with `pytest -m e2e` for the full harness; `pytest -m "not e2e"` to skip in pre-commit).
